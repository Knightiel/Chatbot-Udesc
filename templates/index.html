<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UDESC ChatBot — Assistente para Estudantes</title>
  <style>
    /* ── Reset & tokens ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:       #00843d;
      --green-dark:  #005c2b;
      --green-light: #e6f4ec;
      --gray-100:    #f4f6f8;
      --gray-200:    #e9ecef;
      --gray-400:    #adb5bd;
      --gray-600:    #6c757d;
      --gray-900:    #212529;
      --white:       #ffffff;
      --shadow:      0 4px 24px rgba(0,0,0,.12);
      --radius:      16px;
      --radius-sm:   8px;
      --font:        'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--gray-100);
      color: var(--gray-900);
    }

    /* ── Layout ─────────────────────────────────────────────── */
    .page {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 720px;
      margin: 0 auto;
      background: var(--white);
      box-shadow: var(--shadow);
    }

    /* ── Header ─────────────────────────────────────────────── */
    .header {
      background: var(--green);
      color: var(--white);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .header-info h1 {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.2;
    }

    .header-info p {
      font-size: 12px;
      opacity: .85;
      margin-top: 2px;
    }

    .online-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #6be88e;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }

    /* ── Messages ───────────────────────────────────────────── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      scroll-behavior: smooth;
    }

    .bubble-wrap {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      max-width: 88%;
      animation: fadeIn .2s ease;
    }

    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } }

    .bubble-wrap.user  { align-self: flex-end; flex-direction: row-reverse; }
    .bubble-wrap.bot   { align-self: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bubble.user {
      background: var(--green);
      color: var(--white);
      border-bottom-right-radius: var(--radius-sm);
    }

    .bubble.bot {
      background: var(--gray-100);
      color: var(--gray-900);
      border-bottom-left-radius: var(--radius-sm);
      border: 1px solid var(--gray-200);
    }

    /* Markdown-like bold */
    .bubble b, .bubble strong { font-weight: 700; }

    .bubble-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--green-light);
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      align-self: flex-end;
    }

    /* Typing indicator */
    .typing .bubble {
      display: flex;
      gap: 5px;
      padding: 12px 16px;
      align-items: center;
    }

    .dot {
      width: 8px; height: 8px;
      background: var(--gray-400);
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* Hyperlinks inside bot messages */
    .bubble a {
      color: var(--green);
      text-decoration: underline;
      word-break: break-all;
    }
    .bubble.user a { color: #d4f5e0; }

    /* ── Input area ──────────────────────────────────────────── */
    .input-area {
      padding: 14px 16px;
      border-top: 1px solid var(--gray-200);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
      background: var(--white);
    }

    textarea {
      flex: 1;
      resize: none;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      max-height: 120px;
      outline: none;
      transition: border-color .15s;
    }
    textarea:focus { border-color: var(--green); }

    button.send {
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 50%;
      background: var(--green);
      color: var(--white);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .15s, transform .1s;
    }
    button.send:hover  { background: var(--green-dark); }
    button.send:active { transform: scale(.94); }
    button.send:disabled { background: var(--gray-400); cursor: default; }

    /* ── Footer ─────────────────────────────────────────────── */
    .footer {
      text-align: center;
      font-size: 11px;
      color: var(--gray-400);
      padding: 6px 0 10px;
      flex-shrink: 0;
    }

    /* ── Scrollbar ───────────────────────────────────────────── */
    .messages::-webkit-scrollbar { width: 5px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 99px; }

    /* ── Responsive ──────────────────────────────────────────── */
    @media (max-width: 480px) {
      .page { max-width: 100%; box-shadow: none; }
      .bubble-wrap { max-width: 96%; }
    }
  </style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <div class="header">
    <div class="avatar">🎓</div>
    <div class="header-info">
      <h1>UDESC ChatBot</h1>
      <p><span class="online-dot"></span>Assistente para estudantes estrangeiros · International student assistant</p>
    </div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages"></div>

  <!-- Input -->
  <div class="input-area">
    <textarea
      id="input"
      rows="1"
      placeholder="Digite sua mensagem / Type your message…"
      aria-label="Mensagem"
      maxlength="500"
    ></textarea>
    <button class="send" id="send-btn" title="Enviar" aria-label="Enviar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>

  <div class="footer">UDESC — Universidade do Estado de Santa Catarina</div>
</div>

<script>
  // ── Session ID (sem login, sem cadastro) ─────────────────────
  let sessionId = localStorage.getItem("udesc_session_id");
  if (!sessionId) {
    sessionId = crypto.randomUUID
      ? crypto.randomUUID()
      : "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, c => {
          const r = Math.random() * 16 | 0;
          return (c === "x" ? r : (r & 0x3 | 0x8)).toString(16);
        });
    localStorage.setItem("udesc_session_id", sessionId);
  }

  // ── DOM refs ─────────────────────────────────────────────────
  const messagesEl = document.getElementById("messages");
  const inputEl    = document.getElementById("input");
  const sendBtn    = document.getElementById("send-btn");

  // ── Helpers ──────────────────────────────────────────────────
  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function renderMarkdown(text) {
    // *bold* and **bold**
    text = text.replace(/\*\*(.+?)\*\*/g, "<b>$1</b>");
    text = text.replace(/\*([^*\n]+?)\*/g, "<b>$1</b>");
    // URLs → clickable links
    text = text.replace(
      /(https?:\/\/[^\s<>"]+)/g,
      '<a href="$1" target="_blank" rel="noopener">$1</a>'
    );
    return text;
  }

  function addBubble(text, role) {
    const wrap = document.createElement("div");
    wrap.className = `bubble-wrap ${role}`;

    if (role === "bot") {
      const av = document.createElement("div");
      av.className = "bubble-avatar";
      av.textContent = "🎓";
      wrap.appendChild(av);
    }

    const bubble = document.createElement("div");
    bubble.className = `bubble ${role}`;
    bubble.innerHTML = renderMarkdown(text);
    wrap.appendChild(bubble);

    messagesEl.appendChild(wrap);
    scrollBottom();
    return bubble;
  }

  function showTyping() {
    const wrap = document.createElement("div");
    wrap.className = "bubble-wrap bot typing";
    wrap.id = "typing-indicator";
    const av = document.createElement("div");
    av.className = "bubble-avatar";
    av.textContent = "🎓";
    wrap.appendChild(av);
    const bubble = document.createElement("div");
    bubble.className = "bubble bot";
    bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollBottom();
  }

  function hideTyping() {
    const el = document.getElementById("typing-indicator");
    if (el) el.remove();
  }

  // ── Send message ─────────────────────────────────────────────
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    addBubble(text, "user");
    inputEl.value = "";
    inputEl.style.height = "auto";
    sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, session_id: sessionId }),
      });

      const data = await res.json();
      hideTyping();

      if (data.reply) {
        addBubble(data.reply, "bot");
      } else {
        addBubble("Erro ao processar mensagem. Tente novamente.", "bot");
      }
    } catch {
      hideTyping();
      addBubble("❌ Sem conexão com o servidor. Verifique se o ChatBot está rodando.", "bot");
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  // ── Auto-resize textarea ─────────────────────────────────────
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
  });

  // ── Events ───────────────────────────────────────────────────
  sendBtn.addEventListener("click", sendMessage);

  inputEl.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // ── Inicialização — disparar saudação automaticamente ────────
  (async () => {
    sendBtn.disabled = true;
    showTyping();
    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: "oi", session_id: sessionId }),
      });
      const data = await res.json();
      hideTyping();
      if (data.reply) addBubble(data.reply, "bot");
    } catch {
      hideTyping();
      addBubble("⚠️ Servidor indisponível. Execute: python app.py", "bot");
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  })();
</script>
</body>
</html>
